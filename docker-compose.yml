services:
  adam:
    build: .
    image: ubermetroid/adam:latest
    container_name: adam
    restart: unless-stopped
    ports:
      - ${PORT:-4403}:4403
    volumes:
      - ${ADAM_DATA_PATH:-./data}:/app/data
    environment:
      PORT: 4403
      SITE_TITLE: ${ADAM_SITE_TITLE:-Adam}
      ADAM_PIN: ${ADAM_PIN:-}
      BASE_URL: ${BASE_URL:-http://localhost:4403}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      SINGLE_LIST: ${SINGLE_LIST:-false}
      ENABLE_TRANSLATION: ${ENABLE_TRANSLATION:-false}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}

